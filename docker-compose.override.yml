services:
  bp_sync:
    volumes:
      - ./bp_sync/src:/app/src
    env_file:
      - ./.env
    ports:
     - 8000:8000

  bp_sync-migrations:
    volumes:
      - ./bp_sync/src:/app/src
    env_file:
      - ./.env

  db:
    ports:
     - 5442:5432
    env_file:
      - ./.env

  redis:
    ports:
      - 6379:6379

  seq:
    volumes:
      - seq-data:/data
    env_file:
      - ./.env
    ports:
      - "5341:80"

volumes:
  seq-data:
  db_data:
  redis-data:
